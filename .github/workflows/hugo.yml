name: Deploy Hugo site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: 0.164.0   # pinned to local `hugo version`
  HUGO_ENVIRONMENT: production
  TZ: America/Santiago

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Hugo CLI (extended)
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # for .GitInfo / .Lastmod if enabled

      - name: Setup Go   # required to fetch Hugo Modules
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4   # reads packageManager from package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (Tailwind, Pagefind, ...)
        run: pnpm install --frozen-lockfile

      - name: Put local binaries on PATH   # Hugo invokes `tailwindcss` from here
        run: echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Build Pagefind search index
        run: pnpm run pagefind

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
